<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in de Energia · Sua Carreira Começa Agora</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f2;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 64px}
.app{width:100%;max-width:640px}
.header{text-align:center;margin-bottom:32px;padding-top:16px}
.tag{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:12px}
h1{font-size:22px;font-weight:600;color:#1a1a2e;line-height:1.3;margin-bottom:8px}
.sub{font-size:14px;color:#666;line-height:1.6}
.pb{height:3px;background:#e0e0e0;border-radius:2px;margin-bottom:32px;overflow:hidden}
.pf{height:100%;background:#1a1a2e;border-radius:2px;transition:width .4s ease}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:20px;margin-bottom:12px}
.ct{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:8px}
.cq{font-size:16px;color:#1a1a2e;line-height:1.5;margin-bottom:14px}
.ch{font-size:13px;color:#999;line-height:1.5;margin-bottom:14px;font-style:italic}
textarea{width:100%;font-size:14px;font-family:inherit;color:#222;background:#f8f8f6;border:1px solid #e0e0e0;border-radius:8px;padding:12px;resize:vertical;outline:none;transition:border-color .15s;line-height:1.6;min-height:90px}
textarea:focus{border-color:#1a1a2e}
textarea::placeholder{color:#bbb}
input[type=text]{width:100%;font-size:16px;font-family:inherit;color:#222;background:#f8f8f6;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;outline:none;transition:border-color .15s}
input:focus{border-color:#1a1a2e}
input[type=range]{width:100%}
.br{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
button{font-size:14px;font-family:inherit;padding:8px 18px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#333;cursor:pointer;transition:background .15s,transform .1s}
button:hover{background:#f0f0f0}
button:active{transform:scale(.98)}
button.p{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
button.p:hover{opacity:.85}
.load{text-align:center;padding:48px 20px}
.load p{font-size:14px;color:#888}
.dots::after{content:'';animation:dt 1.4s infinite}
@keyframes dt{0%,20%{content:'.'}40%,60%{content:'..'}80%,100%{content:'...'}}
.res{animation:fi .4s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sec{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:20px;margin-bottom:12px}
.sl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:10px}
.st{font-size:14px;color:#222;line-height:1.75}
.bdg{display:inline-block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:20px;background:#f0f0f0;color:#888;margin-bottom:16px}
.meter{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin:10px 0 4px}
.mf{height:100%;border-radius:3px;transition:width .8s ease}
.mlabs{display:flex;justify-content:space-between;font-size:11px;color:#aaa}
.alerta{display:flex;gap:10px;padding:10px 14px;background:#f8f8f6;border-radius:8px;margin-bottom:8px;border-left:3px solid #ddd;font-size:14px;color:#222;line-height:1.6}
.alerta.alto{border-left-color:#E24B4A}
.alerta.medio{border-left-color:#BA7517}
.alerta.baixo{border-left-color:#1D9E75}
.acao{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #eee;font-size:14px;color:#222;line-height:1.6}
.acao:last-child{border-bottom:none}
.an{font-size:13px;font-weight:600;color:#aaa;min-width:20px}
.rr{text-align:center;margin-top:24px}
.rr button{font-size:13px;color:#888}
.slrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slrow span{font-size:13px;color:#aaa}
#sv{font-size:14px;font-weight:600;color:#1a1a2e;min-width:24px;text-align:right}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="tag">Sua Carreira Começa Agora · E5</span>
    <h1>Check-in semanal de energia</h1>
    <p class="sub">3 perguntas. 2 minutos. Um diagnóstico honesto<br>sobre como sua semana foi de verdade.</p>
  </div>
  <div id="main"></div>
</div>
<script>
let step='nome',nome='',nivel=5,respostas={},pIdx=0;
const hoje=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
const perguntas=[{id:'carrega',num:'Pergunta 2 de 3',q:'O que mais te carregou essa semana — e o que mais drenou?',h:'Não precisa ser uma lista. Escreve o que vier primeiro.'},{id:'decisao',num:'Pergunta 3 de 3',q:'Tem alguma situação que você está suportando — mas que sabe que não deveria estar?',h:'Algo que não dói o suficiente pra largar, mas que te deixa um pouco menor cada vez que enfrenta.'}];
function render(){const m=document.getElementById('main');if(step==='nome')rNome(m);else if(step==='nivel')rNivel(m);else if(step==='perguntas')rP(m);else if(step==='analisando')m.innerHTML='<div class="load"><p>Analisando sua semana<span class="dots"></span></p><p style="font-size:12px;color:#aaa;margin-top:8px">Gerando seu diagnóstico</p></div>';}
function rNome(m){m.innerHTML='';const bdg=document.createElement('div');bdg.className='bdg';bdg.textContent=hoje;m.appendChild(bdg);const c=document.createElement('div');c.className='card';c.innerHTML='<div class="ct">Bem-vindo ao check-in</div><div class="cq" style="margin-bottom:14px">Qual é o seu nome?</div><input type="text" id="inp" placeholder="Escreve aqui..." autocomplete="off">';m.appendChild(c);const r=document.createElement('div');r.className='br';const b=document.createElement('button');b.className='p';b.textContent='Começar';b.onclick=()=>{const v=document.getElementById('inp').value.trim();if(!v)return;nome=v;step='nivel';render();};r.appendChild(b);m.appendChild(r);setTimeout(()=>document.getElementById('inp')&&document.getElementById('inp').focus(),50);}
function rNivel(m){m.innerHTML='';const pb=document.createElement('div');pb.className='pb';pb.innerHTML='<div class="pf" style="width:20%"></div>';m.appendChild(pb);const c=document.createElement('div');c.className='card';c.innerHTML='<div class="ct">Pergunta 1 de 3</div><div class="cq">No geral, como foi sua energia essa semana?</div><div class="ch">1 = completamente esgotada, 10 = com energia de sobra</div><div class="slrow"><span>Esgotada</span><span id="sv">5</span><span>Com energia</span></div><input type="range" id="sl" min="1" max="10" value="5" step="1"><div id="em" style="text-align:center;font-size:22px;margin-top:8px">😐</div>';m.appendChild(c);const sl=c.querySelector('#sl');const sv_=c.querySelector('#sv');const em=c.querySelector('#em');const ems=['','😩','😩','😔','😐','😐','🙂','🙂','😊','😊','🔥'];sl.oninput=()=>{const v=parseInt(sl.value);nivel=v;sv_.textContent=v;em.textContent=ems[v];};const r=document.createElement('div');r.className='br';const b=document.createElement('button');b.className='p';b.textContent='Próxima';b.onclick=()=>{step='perguntas';pIdx=0;render();};r.appendChild(b);m.appendChild(r);}
function rP(m){m.innerHTML='';const pct=40+Math.round((pIdx/perguntas.length)*50);const pb=document.createElement('div');pb.className='pb';pb.innerHTML=`<div class="pf" style="width:${pct}%"></div>`;m.appendChild(pb);const p=perguntas[pIdx];const c=document.createElement('div');c.className='card';c.innerHTML=`<div class="ct">${p.num}</div><div class="cq">${p.q}</div><div class="ch">${p.h}</div><textarea id="resp" placeholder="Escreve com honestidade...">${respostas[p.id]||''}</textarea>`;m.appendChild(c);const r=document.createElement('div');r.className='br';if(pIdx>0){const bk=document.createElement('button');bk.textContent='Voltar';bk.onclick=()=>{pIdx--;render();};r.appendChild(bk);}const isLast=pIdx===perguntas.length-1;const b=document.createElement('button');b.className='p';b.textContent=isLast?'Ver meu diagnóstico':'Próxima';b.onclick=()=>{const v=document.getElementById('resp').value.trim();if(v.length<5){document.getElementById('resp').focus();return;}respostas[p.id]=v;if(isLast){step='analisando';render();analisar();}else{pIdx++;render();}};r.appendChild(b);m.appendChild(r);setTimeout(()=>document.getElementById('resp')&&document.getElementById('resp').focus(),50);}
function rRes(dados){const m=document.getElementById('main');m.innerHTML='';const pb=document.createElement('div');pb.className='pb';pb.innerHTML='<div class="pf" style="width:100%"></div>';m.appendChild(pb);const bdg=document.createElement('div');bdg.className='bdg';bdg.textContent=hoje;m.appendChild(bdg);const cor=nivel>=7?'#1D9E75':nivel>=4?'#BA7517':'#E24B4A';const h=document.createElement('div');h.className='sec';h.innerHTML=`<div class="sl">Sua semana em energia</div><div style="font-size:22px;font-weight:600;color:#1a1a2e;margin-bottom:6px">${dados.status}</div><div class="meter"><div class="mf" style="width:${nivel*10}%;background:${cor}"></div></div><div class="mlabs"><span>Esgotada</span><span>${nivel}/10</span><span>Com energia</span></div><div class="st" style="margin-top:12px">${dados.resumo}</div>`;m.appendChild(h);if(dados.alertas&&dados.alertas.length){const as=document.createElement('div');as.className='sec';as.innerHTML='<div class="sl">Alertas desta semana</div>';dados.alertas.forEach(a=>{const d=document.createElement('div');d.className=`alerta ${a.nivel}`;d.innerHTML=`<div style="min-width:18px">${a.nivel==='alto'?'⚠':a.nivel==='medio'?'→':'✓'}</div><div>${a.texto}</div>`;as.appendChild(d);});m.appendChild(as);}const ps=document.createElement('div');ps.className='sec';ps.innerHTML=`<div class="sl">O que o padrão desta semana diz</div><div class="st">${dados.padrao}</div>`;m.appendChild(ps);const as2=document.createElement('div');as2.className='sec';as2.innerHTML='<div class="sl">O que fazer com isso agora</div>';dados.acoes.forEach((a,i)=>{const d=document.createElement('div');d.className='acao';d.innerHTML=`<div class="an">${i+1}</div><div>${a}</div>`;as2.appendChild(d);});m.appendChild(as2);const qs=document.createElement('div');qs.className='sec';qs.innerHTML=`<div class="sl">Uma pergunta pra levar pra semana</div><div class="st" style="font-style:italic">${dados.pergunta}</div>`;m.appendChild(qs);const rr=document.createElement('div');rr.className='rr';const b=document.createElement('button');b.textContent='Fazer check-in da próxima semana';b.onclick=()=>{step='nome';nome='';nivel=5;respostas={};pIdx=0;render();};rr.appendChild(b);m.appendChild(rr);}
async function analisar(){const prompt=`Coach estratégico de energia para universitários. Analise o check-in.\n\nNome: ${nome}\nData: ${hoje}\nNível geral (1-10): ${nivel}\nO que carregou e drenou: "${respostas.carrega}"\nSituação suportando: "${respostas.decisao}"\n\nJSON válido sem markdown:\n{"status":"3 a 5 palavras sobre o estado de energia","resumo":"1 frase sobre o que a semana revelou","alertas":[{"nivel":"alto|medio|baixo","texto":"alerta específico"},{"nivel":"baixo","texto":"algo positivo"}],"padrao":"1 parágrafo sobre o padrão da semana","acoes":["ação 1","ação 2","ação 3"],"pergunta":"uma pergunta poderosa pra carregar"}`;
try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,messages:[{role:"user",content:prompt}]})});const d=await r.json();const t=d.content.map(i=>i.text||'').join('');const p=JSON.parse(t.replace(/```json|```/g,'').trim());step='resultado';rRes(p);}catch(e){document.getElementById('main').innerHTML='<div class="card"><div class="cq">Algo deu errado. Tenta de novo.</div></div><div class="rr"><button onclick="step=\'analisando\';render();analisar()">Tentar novamente</button></div>';}}
render();
</script>
</body>
</html>
