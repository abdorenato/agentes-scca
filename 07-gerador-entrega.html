<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Entrega · Sua Carreira Começa Agora</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f2;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 64px}
.app{width:100%;max-width:640px}
.header{text-align:center;margin-bottom:32px;padding-top:16px}
.tag{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:12px}
h1{font-size:22px;font-weight:600;color:#1a1a2e;line-height:1.3;margin-bottom:8px}
.sub{font-size:14px;color:#666;line-height:1.6}
.pb{height:3px;background:#e0e0e0;border-radius:2px;margin-bottom:32px;overflow:hidden}
.pf{height:100%;background:#1a1a2e;border-radius:2px;transition:width .4s ease}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:20px;margin-bottom:12px}
.ct{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:8px}
.cq{font-size:16px;color:#1a1a2e;line-height:1.5;margin-bottom:14px}
.ch{font-size:13px;color:#999;line-height:1.5;margin-bottom:14px;font-style:italic}
textarea{width:100%;font-size:14px;font-family:inherit;color:#222;background:#f8f8f6;border:1px solid #e0e0e0;border-radius:8px;padding:12px;resize:vertical;outline:none;transition:border-color .15s;line-height:1.6;min-height:70px}
textarea:focus{border-color:#1a1a2e}
textarea::placeholder{color:#bbb}
input[type=text]{width:100%;font-size:16px;font-family:inherit;color:#222;background:#f8f8f6;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;outline:none;transition:border-color .15s}
input:focus{border-color:#1a1a2e}
.br{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
button{font-size:14px;font-family:inherit;padding:8px 18px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#333;cursor:pointer;transition:background .15s,transform .1s}
button:hover{background:#f0f0f0}
button:active{transform:scale(.98)}
button.p{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
button.p:hover{opacity:.85}
.load{text-align:center;padding:48px 20px}
.load p{font-size:14px;color:#888}
.dots::after{content:'';animation:dt 1.4s infinite}
@keyframes dt{0%,20%{content:'.'}40%,60%{content:'..'}80%,100%{content:'...'}}
.res{animation:fi .4s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sec{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:20px;margin-bottom:12px}
.sl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:10px}
.st{font-size:14px;color:#222;line-height:1.75}
.ecard{border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;margin-bottom:10px}
.eheader{padding:14px 18px;background:#f8f8f6;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.eheader:hover{background:#f0f0f0}
.etitle{font-size:15px;font-weight:600;color:#1a1a2e}
.eamb{font-size:12px;color:#aaa;margin-top:2px}
.efmt{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:3px 10px;border-radius:20px;background:#fff;color:#888;border:1px solid #e8e8e8;white-space:nowrap}
.ebody{padding:16px 18px;display:none;border-top:1px solid #eee}
.ebody.open{display:block}
.edesc{font-size:14px;color:#222;line-height:1.7;margin-bottom:14px}
.il{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:8px}
.iitem{display:flex;gap:8px;padding:5px 0;font-size:13px;color:#666;line-height:1.5}
.idot{width:4px;height:4px;border-radius:50%;background:#aaa;margin-top:6px;flex-shrink:0}
.epasso{background:#f8f8f6;border-radius:8px;padding:12px 14px;font-size:13px;color:#222;line-height:1.6;margin-top:12px}
.plabel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#aaa;margin-bottom:4px}
.rec{background:#e8f5ee;border:1px solid #9FE1CB;border-radius:12px;padding:16px 18px;margin-bottom:12px}
.rlabel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#0F6E56;margin-bottom:6px}
.rtext{font-size:14px;color:#222;line-height:1.7}
.chev{font-size:12px;color:#aaa;transition:transform .2s}
.ecard.open .chev{transform:rotate(180deg)}
.rr{text-align:center;margin-top:24px}
.rr button{font-size:13px;color:#888}
.tbtn{font-size:13px;padding:6px 14px;border-radius:20px;border:1px solid #ddd;background:transparent;color:#888;cursor:pointer;margin:4px}
.tbtn.sel{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="tag">Sua Carreira Começa Agora · E7</span>
    <h1>Gerador de entrega</h1>
    <p class="sub">Você tem um posicionamento. O agente sugere<br>o que produzir, em qual formato e pra qual ambiente.</p>
  </div>
  <div id="main"></div>
</div>
<script>
let step='nome',nome='',frase='',ambiente='',tempo='1 a 2h';
function render(){const m=document.getElementById('main');if(step==='nome')rNome(m);else if(step==='form')rForm(m);else if(step==='gerando')m.innerHTML='<div class="load"><p>Gerando suas entregas<span class="dots"></span></p><p style="font-size:12px;color:#aaa;margin-top:8px">Mapeando formatos e ideias</p></div>';}
function rNome(m){m.innerHTML='';const c=document.createElement('div');c.className='card';c.innerHTML='<div class="ct">Antes de começar</div><div class="cq" style="margin-bottom:14px">Qual é o seu nome?</div><input type="text" id="inp" placeholder="Escreve aqui..." autocomplete="off">';m.appendChild(c);const r=document.createElement('div');r.className='br';const b=document.createElement('button');b.className='p';b.textContent='Continuar';b.onclick=()=>{const v=document.getElementById('inp').value.trim();if(!v)return;nome=v;step='form';render();};r.appendChild(b);m.appendChild(r);setTimeout(()=>document.getElementById('inp')&&document.getElementById('inp').focus(),50);}
function rForm(m){m.innerHTML='';const pb=document.createElement('div');pb.className='pb';pb.innerHTML='<div class="pf" style="width:20%"></div>';m.appendChild(pb);const c1=document.createElement('div');c1.className='card';c1.innerHTML='<div class="ct">Seu posicionamento</div><div class="cq">Qual é sua frase de apresentação?</div><div class="ch">Pode ser a que você construiu no E6. O que você faz, pra quem e de forma diferente.</div><textarea id="frase" placeholder="Eu ajudo [quem] a [resolver o quê] de uma forma que [diferencial]..."></textarea>';m.appendChild(c1);const c2=document.createElement('div');c2.className='card';c2.innerHTML='<div class="ct">Onde você quer aparecer</div><div class="cq">Qual é o ambiente onde você quer ser visto?</div><div class="ch">Quanto mais específico, melhor. Não "LinkedIn" — mas "grupos de marketing da minha faculdade".</div><textarea id="amb" style="min-height:60px" placeholder="Ex: grupo de finanças do curso, comunidade de startups no Discord..."></textarea>';m.appendChild(c2);const c3=document.createElement('div');c3.className='card';c3.innerHTML='<div class="ct">Quanto tempo você tem por semana</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px" id="tbtns"><button class="tbtn" data-v="menos de 1h">Menos de 1h</button><button class="tbtn sel" data-v="1 a 2h">1 a 2h</button><button class="tbtn" data-v="2 a 4h">2 a 4h</button><button class="tbtn" data-v="mais de 4h">Mais de 4h</button></div>';m.appendChild(c3);c3.querySelectorAll('.tbtn').forEach(b=>{b.onclick=()=>{c3.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');tempo=b.dataset.v;};});const r=document.createElement('div');r.className='br';const b=document.createElement('button');b.className='p';b.textContent='Gerar entregas';b.onclick=()=>{const f=document.getElementById('frase').value.trim();const a=document.getElementById('amb').value.trim();if(f.length<10){document.getElementById('frase').focus();return;}if(a.length<5){document.getElementById('amb').focus();return;}frase=f;ambiente=a;step='gerando';render();gerar();};r.appendChild(b);m.appendChild(r);}
function rRes(dados){const m=document.getElementById('main');m.innerHTML='';const pb=document.createElement('div');pb.className='pb';pb.innerHTML='<div class="pf" style="width:100%"></div>';m.appendChild(pb);const res=document.createElement('div');res.className='res';const intro=document.createElement('div');intro.className='sec';intro.innerHTML=`<div class="sl">Leitura do posicionamento</div><div class="st">${dados.leitura}</div>`;res.appendChild(intro);const lbl=document.createElement('div');lbl.style.cssText='font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin:16px 0 8px';lbl.textContent='5 formatos de entrega — clique pra expandir';res.appendChild(lbl);dados.entregas.forEach(e=>{const card=document.createElement('div');card.className='ecard';const hdr=document.createElement('div');hdr.className='eheader';hdr.innerHTML=`<div><div class="etitle">${e.titulo}</div><div class="eamb">${e.ambiente}</div></div><div style="display:flex;align-items:center;gap:8px"><span class="efmt">${e.formato}</span><span class="chev">▼</span></div>`;const body=document.createElement('div');body.className='ebody';body.innerHTML=`<div class="edesc">${e.descricao}</div><div class="il">3 ideias concretas</div>${e.ideias.map(id=>`<div class="iitem"><div class="idot"></div>${id}</div>`).join('')}<div class="epasso"><div class="plabel">Primeiro passo</div>${e.primeiro_passo}</div>`;hdr.onclick=()=>{const ab=card.classList.contains('open');document.querySelectorAll('.ecard').forEach(c=>{c.classList.remove('open');c.querySelector('.ebody').classList.remove('open');});if(!ab){card.classList.add('open');body.classList.add('open');}};card.appendChild(hdr);card.appendChild(body);res.appendChild(card);});const rec=document.createElement('div');rec.className='rec';rec.innerHTML=`<div class="rlabel">Qual começar primeiro</div><div class="rtext">${dados.recomendacao}</div>`;res.appendChild(rec);const pl=document.createElement('div');pl.className='sec';pl.innerHTML=`<div class="sl">Plano de 30 dias sugerido</div><div class="st">${dados.plano_30_dias}</div>`;res.appendChild(pl);m.appendChild(res);const rr=document.createElement('div');rr.className='rr';const b=document.createElement('button');b.textContent='Gerar para outro posicionamento';b.onclick=()=>{step='nome';nome='';frase='';ambiente='';tempo='1 a 2h';render();};rr.appendChild(b);m.appendChild(rr);}
async function gerar(){const prompt=`Especialista em estratégia de visibilidade para universitários. Traduza um posicionamento em entregas concretas.\n\nNome: ${nome}\nPosicionamento: "${frase}"\nAmbiente: "${ambiente}"\nTempo disponível: ${tempo} por semana\n\nGere 5 formatos de entrega diferentes. Cada um deve ser concreto, realizável no tempo disponível e demonstrar o posicionamento naturalmente.\n\nJSON válido sem markdown:\n{"leitura":"1 parágrafo sobre o posicionamento","entregas":[{"titulo":"nome curto","formato":"tipo","ambiente":"onde específico","descricao":"2 frases","ideias":["ideia 1","ideia 2","ideia 3"],"primeiro_passo":"ação que começa com verbo"}],"recomendacao":"qual começar primeiro e por quê","plano_30_dias":"como distribuir em 4 semanas"}`;
try{const r=await fetch("/api/proxy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:prompt}]})});const d=await r.json();const t=d.content.map(i=>i.text||'').join('');const p=JSON.parse(t.replace(/```json|```/g,'').trim());step='resultado';rRes(p);}catch(e){document.getElementById('main').innerHTML='<div class="card"><div class="cq">Algo deu errado. Tenta de novo.</div></div><div class="rr"><button onclick="step=\'gerando\';render();gerar()">Tentar novamente</button></div>';}}
render();
</script>
</body>
</html>
