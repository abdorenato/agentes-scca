<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pergunta Invertida · Sua Carreira Começa Agora</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f2;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 64px}.app{width:100%;max-width:640px}.header{text-align:center;margin-bottom:32px;padding-top:16px}.header-tag{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:12px}.header h1{font-size:22px;font-weight:600;color:#1a1a2e;line-height:1.3;margin-bottom:8px}.header p{font-size:14px;color:#666;line-height:1.6}.progress-bar{height:3px;background:#e0e0e0;border-radius:2px;margin-bottom:32px;overflow:hidden}.progress-fill{height:100%;background:#1a1a2e;border-radius:2px;transition:width .4s ease}.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:20px;margin-bottom:12px}.card-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:8px}.card-q{font-size:16px;color:#1a1a2e;line-height:1.5;margin-bottom:14px}.card-hint{font-size:13px;color:#999;line-height:1.5;margin-bottom:14px;font-style:italic}textarea{width:100%;font-size:14px;font-family:inherit;color:#222;background:#f8f8f6;border:1px solid #e0e0e0;border-radius:8px;padding:12px;resize:vertical;outline:none;transition:border-color .15s;line-height:1.6}textarea:focus{border-color:#1a1a2e}textarea::placeholder{color:#bbb}input[type=text]{width:100%;font-size:16px;font-family:inherit;color:#222;background:#f8f8f6;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;outline:none;transition:border-color .15s}input:focus{border-color:#1a1a2e}.btn-row{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}button{font-size:14px;font-family:inherit;padding:8px 18px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#333;cursor:pointer;transition:background .15s,transform .1s}button:hover{background:#f0f0f0}button:active{transform:scale(.98)}button.primary{background:#1a1a2e;color:#fff;border-color:#1a1a2e}button.primary:hover{opacity:.85}.loading{text-align:center;padding:48px 20px}.loading p{font-size:14px;color:#888}.loading-dots::after{content:'';animation:dots 1.4s infinite}@keyframes dots{0%,20%{content:'.'}40%,60%{content:'..'}80%,100%{content:'...'}}.result{animation:fadeIn .4s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.secao{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:20px;margin-bottom:12px}.secao-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:10px}.secao-text{font-size:14px;color:#222;line-height:1.75}.inv-box{background:#f8f8f6;border-radius:8px;padding:14px;margin-bottom:14px}.inv-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:6px}.inv-text{font-size:14px;color:#222;line-height:1.6}.sol-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #eee}.sol-item:last-child{border-bottom:none;padding-bottom:0}.sol-num{font-size:13px;font-weight:600;color:#aaa;min-width:20px;padding-top:2px}.sol-c .sol-from{font-size:11px;color:#aaa;margin-bottom:4px}.sol-c .sol-title{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:4px}.sol-c .sol-desc{font-size:13px;color:#666;line-height:1.6}.sab-item{padding:10px 0;border-bottom:1px solid #eee;font-size:14px;color:#222;line-height:1.6}.sab-item:last-child{border-bottom:none}.sab-num{font-size:11px;font-weight:600;color:#aaa;margin-bottom:3px}.restart-row{text-align:center;margin-top:24px}.restart-row button{font-size:13px;color:#888}</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-tag">Sua Carreira Começa Agora · E4</span>
    <h1>A técnica da pergunta invertida</h1>
    <p>Você tem um problema. Em vez de perguntar como resolver,<br>a gente vai perguntar como garantir que nunca seja resolvido.</p>
  </div>
  <div id="main"></div>
</div>
<script>
let step='nome',nome='',problema='',sabotadores=[];
function render(){const m=document.getElementById('main');if(step==='nome')rNome(m);else if(step==='problema')rProblema(m);else if(step==='gerando_sab')rLoad(m,'Invertendo o problema','Listando os sabotadores');else if(step==='sabotadores')rSabotadores(m);else if(step==='gerando_sol')rLoad(m,'Invertendo cada sabotador','Revelando as soluções');else if(step==='resultado')return;}
function rLoad(m,l1,l2){m.innerHTML=`<div class="loading"><p>${l1}<span class="loading-dots"></span></p><p style="font-size:12px;color:#aaa;margin-top:8px">${l2}</p></div>`;}
function rNome(m){m.innerHTML='';const c=document.createElement('div');c.className='card';c.innerHTML='<div class="card-tag">Antes de começar</div><div class="card-q" style="margin-bottom:14px">Qual é o seu nome?</div><input type="text" id="inp" placeholder="Escreve aqui..." autocomplete="off">';m.appendChild(c);const r=document.createElement('div');r.className='btn-row';const b=document.createElement('button');b.className='primary';b.textContent='Continuar';b.onclick=()=>{const v=document.getElementById('inp').value.trim();if(!v)return;nome=v;step='problema';render();};r.appendChild(b);m.appendChild(r);setTimeout(()=>document.getElementById('inp')&&document.getElementById('inp').focus(),50);}
function rProblema(m){m.innerHTML='';const pb=document.createElement('div');pb.className='progress-bar';pb.innerHTML='<div class="progress-fill" style="width:10%"></div>';m.appendChild(pb);const c=document.createElement('div');c.className='card';c.innerHTML='<div class="card-tag">O problema</div><div class="card-q">Qual é o problema que você quer resolver?</div><div class="card-hint">Pode ser da faculdade, do trabalho, da carreira. Descreve em uma ou duas frases.</div><textarea id="inp" style="min-height:80px" placeholder="Ex: não consigo me manter constante nos estudos..."></textarea>';m.appendChild(c);const r=document.createElement('div');r.className='btn-row';const b=document.createElement('button');b.className='primary';b.textContent='Inverter o problema';b.onclick=()=>{const v=document.getElementById('inp').value.trim();if(v.length<10){document.getElementById('inp').focus();return;}problema=v;step='gerando_sab';render();gerarSabotadores();};r.appendChild(b);m.appendChild(r);setTimeout(()=>document.getElementById('inp')&&document.getElementById('inp').focus(),50);}
function rSabotadores(m){m.innerHTML='';const pb=document.createElement('div');pb.className='progress-bar';pb.innerHTML='<div class="progress-fill" style="width:45%"></div>';m.appendChild(pb);const inv=document.createElement('div');inv.className='inv-box';inv.innerHTML=`<div class="inv-label">Pergunta original</div><div class="inv-text" style="color:#999;margin-bottom:10px">"${problema}"</div><div class="inv-label" style="margin-top:10px">Pergunta invertida</div><div class="inv-text" style="font-weight:600">"Como garantir que esse problema <u>nunca</u> seja resolvido?"</div>`;m.appendChild(inv);const c=document.createElement('div');c.className='card';c.innerHTML='<div class="card-tag">Os sabotadores</div><div class="card-q" style="margin-bottom:4px">O que garantiria o fracasso total. Reconhece algum desses?</div>';sabotadores.forEach((s,i)=>{const d=document.createElement('div');d.className='sab-item';d.innerHTML=`<div class="sab-num">Sabotador ${i+1}</div>${s}`;c.appendChild(d);});m.appendChild(c);const r=document.createElement('div');r.className='btn-row';const back=document.createElement('button');back.textContent='Mudar o problema';back.onclick=()=>{step='problema';render();};r.appendChild(back);const b=document.createElement('button');b.className='primary';b.textContent='Inverter cada um';b.onclick=()=>{step='gerando_sol';render();gerarInversoes();};r.appendChild(b);m.appendChild(r);}
function rResultado(dados){const m=document.getElementById('main');m.innerHTML='';const pb=document.createElement('div');pb.className='progress-bar';pb.innerHTML='<div class="progress-fill" style="width:100%"></div>';m.appendChild(pb);const res=document.createElement('div');res.className='result';const intro=document.createElement('div');intro.className='secao';intro.innerHTML=`<div class="secao-label">O que a inversão revelou</div><div class="secao-text">${dados.revelacao}</div>`;res.appendChild(intro);const solCard=document.createElement('div');solCard.className='card';solCard.innerHTML='<div class="secao-label" style="margin-bottom:14px">Soluções que a pergunta direta não geraria</div>';dados.solucoes.forEach((s,i)=>{const item=document.createElement('div');item.className='sol-item';item.innerHTML=`<div class="sol-num">${i+1}</div><div class="sol-c"><div class="sol-from">Invertendo: "${sabotadores[i]||'—'}"</div><div class="sol-title">${s.titulo}</div><div class="sol-desc">${s.descricao}</div></div>`;solCard.appendChild(item);});res.appendChild(solCard);const prox=document.createElement('div');prox.className='secao';prox.innerHTML=`<div class="secao-label">Próximo passo concreto</div><div class="secao-text">${dados.proximo_passo}</div>`;res.appendChild(prox);m.appendChild(res);const rr=document.createElement('div');rr.className='restart-row';const b=document.createElement('button');b.textContent='Resolver outro problema';b.onclick=()=>{step='nome';nome='';problema='';sabotadores=[];render();};rr.appendChild(b);m.appendChild(rr);}
async function gerarSabotadores(){const prompt=`Aplique a técnica da inversão para um estudante universitário.\n\nNome: ${nome}\nProblema: "${problema}"\n\nGere 4 sabotadores concretos e realistas que garantiriam o fracasso total desse problema.\n\nJSON válido:\n{"sabotadores":["sabotador 1","sabotador 2","sabotador 3","sabotador 4"]}`;
try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:prompt}]})});const d=await r.json();const t=d.content.map(i=>i.text||'').join('');const p=JSON.parse(t.replace(/```json|```/g,'').trim());sabotadores=p.sabotadores;step='sabotadores';render();}catch(e){document.getElementById('main').innerHTML='<div class="card"><div class="card-q">Algo deu errado.</div></div><div class="restart-row"><button onclick="step=\'problema\';render()">Voltar</button></div>';}}
async function gerarInversoes(){const prompt=`Inverta cada sabotador para gerar soluções criativas.\n\nNome: ${nome}\nProblema: "${problema}"\n\nSabotadores:\n${sabotadores.map((s,i)=>`${i+1}. ${s}`).join('\n')}\n\nJSON válido:\n{"revelacao":"1 parágrafo sobre o que a técnica revelou","solucoes":[{"titulo":"nome curto","descricao":"2 a 3 frases práticas"},{"titulo":"...","descricao":"..."},{"titulo":"...","descricao":"..."},{"titulo":"...","descricao":"..."}],"proximo_passo":"ação concreta que começa com um verbo"}`;
try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,messages:[{role:"user",content:prompt}]})});const d=await r.json();const t=d.content.map(i=>i.text||'').join('');const p=JSON.parse(t.replace(/```json|```/g,'').trim());step='resultado';rResultado(p);}catch(e){document.getElementById('main').innerHTML='<div class="card"><div class="card-q">Algo deu errado.</div></div>';}}
render();
</script>
</body>
</html>
